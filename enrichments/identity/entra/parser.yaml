name: entra_identity
display_name: Entra ID Identity
version: "1.0.0"
description: >-
  Normalizes pushed Microsoft Entra ID (Microsoft Graph user) records
  (nano_enrich, kind=identity, source=entra) into the user_registry enrichment
  table. The mapping is the repo-sourced replacement for the previously
  hard-coded Vector transform (NAN-1148/NAN-1149/NAN-1151) — updating
  Entra→user_registry field mapping no longer requires an application ship.

# NAN-1151: enrichment-parser flavor. This file lives under
# enrichments/<enrich_kind>/<enrich_source>/parser.yaml, but enrich_kind /
# enrich_source / target_table are also set explicitly here because the parser
# sync reads them straight from the YAML (it does not infer them from the path).
kind: enrichment
enrich_kind: identity
enrich_source: entra
target_table: user_registry

# The remap body emitted as [transforms.enrichment_normalize_identity] in the
# generated _enrichment.toml. Maps a pushed raw Microsoft Graph user object to
# the user_registry columns. Invariants (NAN-1114 / NAN-1123): the enrichment
# sink must never block the shared upstream, `version` is always a non-zero
# integer-ms clock, and `last_synced_at` is its formatted-string form.
normalize_vrl: |
  # Map a raw Microsoft Graph user object (Entra ID) to the user_registry columns.
  now_ms = to_unix_timestamp(now(), unit: "milliseconds")

  external_id = to_string(.id) ?? ""
  if external_id == "" {
      log("entra identity record missing id; dead-lettering", level: "warn")
      abort
  }

  # sync_hash over the raw record (change-detector).
  sync_hash = sha2(encode_json(.), variant: "SHA-256")

  # version + last_synced_at on ONE clock (ms epoch). Sender may supply version;
  # otherwise stamp now. last_synced_at is the formatted-string form of version.
  version = to_int(.version) ?? 0
  if version <= 0 { version = now_ms }
  last_synced_at = format_timestamp!(from_unix_timestamp!(version, unit: "milliseconds"), "%Y-%m-%d %H:%M:%S%.3f")

  # upn + username (local part of UPN before @).
  upn = to_string(.userPrincipalName) ?? ""
  username = upn
  parts = split(upn, "@")
  if length(parts) > 1 { username = parts[0] }

  # account_enabled: MS Graph .accountEnabled bool (default true) -> 0/1;
  # account_status derived from it.
  account_enabled = if (to_bool(.accountEnabled) ?? true) { 1 } else { 0 }
  account_status = if account_enabled == 0 { "disabled" } else { "active" }

  . = {
      "provider_id": to_string(.provider_id) ?? "",
      "external_id": external_id,
      "username": username,
      "upn": upn,
      "email": to_string(.mail) ?? "",
      "display_name": to_string(.displayName) ?? "",
      "first_name": to_string(.givenName) ?? "",
      "last_name": to_string(.surname) ?? "",
      "department": to_string(.department) ?? "",
      "title": to_string(.jobTitle) ?? "",
      "manager_upn": "",
      "manager_display_name": "",
      "company": to_string(.companyName) ?? "",
      "office_location": to_string(.officeLocation) ?? "",
      "city": to_string(.city) ?? "",
      "country": to_string(.country) ?? "",
      "groups": [],
      "account_enabled": account_enabled,
      "account_status": account_status,
      "mfa_enabled": 0,
      "phone": to_string(.mobilePhone) ?? "",
      "employee_id": to_string(.employeeId) ?? "",
      "employee_type": to_string(.employeeType) ?? "employee",
      "sync_hash": sync_hash,
      "last_synced_at": last_synced_at,
      "version": version
  }
